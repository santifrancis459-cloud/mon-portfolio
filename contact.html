            <h1>CONTACT</h1>
    <p>Pour me contacter, vous pouvez utiliser les informations suivantes :</p>
    <label for="name">Nom :</label>
    <input type="text" id="name" name="name" placeholder="SMITH" required oninvalid="this.setCustomValidity('Vous n\'avez pas rempli cette case')" 
oninput="this.setCustomValidity('Veuillez remplir cette case')"><br><br>
    <label for="prenom">Prénom :</label>
    <input type="text" id="prenom" name="prenom" placeholder="John" required oninvalid="this.setCustomValidity('Vous n\'avez pas rempli cette case')" 
oninput="this.setCustomValidity('Veuillez remplir cette case')"><br><br>
<label for="tel">Téléphone :</label>
    <input type="tel" id="tel" name="tel" placeholder="06 12 34 56 78" required><br><br>
    <label for="email">Email :</label>
    <input type="email" id="email" name="email" placeholder="johnsmith@gmail.com" required><br><br>
    <label for="message">Message :</label><br>
    <textarea id="message" name="message" placeholder="Votre message ici..." required></textarea><br><br>
    <input type="submit" value="Envoyer" onclick="alert('Merci pour avoir pensez à me contacter')">
